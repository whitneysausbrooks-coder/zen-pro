kind = "web"
previewPath = "/"
title = "NeuroQuest"
version = "1.0.0"
id = "artifacts/neuro-quest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25323
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/neuro-quest run dev"

[services.env]
PORT = "25323"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/neuro-quest", "run", "build"]
publicDir = "artifacts/neuro-quest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
