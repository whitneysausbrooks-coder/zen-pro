<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport — prevents iOS auto-zoom on input focus -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NeuroQuest" />

    <!-- Theme color (notch/status bar) -->
    <meta name="theme-color" content="#0f1f14" />
    <meta name="theme-color" content="#0f1f14" media="(prefers-color-scheme: dark)" />

    <!-- SEO -->
    <meta name="description" content="NeuroQuest Zen Pro — premium neural conditioning engineered for the modern high-performer. Preserve your peak. Prevent the fade." />
    <meta name="application-name" content="NeuroQuest" />

    <!-- Open Graph — Full rich-link preview (Facebook, LinkedIn, Discord, Slack, iMessage) -->
    <meta property="og:title" content="NeuroQuest Zen Pro — Preserve Your Peak. Prevent The Fade." />
    <meta property="og:description" content="Premium neural conditioning engineered for the modern high-performer. Stop burnout before it starts." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://neuroquest.app" />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="NeuroQuest — Mind & Spirit. Train your brain. Fund the world." />
    <meta property="og:site_name" content="NeuroQuest™" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@NeuroQuestApp" />
    <meta name="twitter:creator" content="@whitneyshauntaye" />
    <meta name="twitter:title" content="NeuroQuest Zen Pro — Preserve Your Peak. Prevent The Fade." />
    <meta name="twitter:description" content="Premium neural conditioning engineered for the modern high-performer. Stop burnout before it starts." />
    <meta name="twitter:image" content="/opengraph.jpg" />
    <meta name="twitter:image:alt" content="NeuroQuest — Mind & Spirit. Your mind is the focus. The world is the winner." />

    <!-- SEO / Authorship -->
    <meta name="author" content="Whitney Shauntaye" />
    <meta name="copyright" content="© 2025 Whitney Shauntaye. NeuroQuest™. All Rights Reserved." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://neuroquest.app" />

    <title>NeuroQuest Zen Pro — Preserve Your Peak. Prevent The Fade.</title>

    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- iOS splash (minimal) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
