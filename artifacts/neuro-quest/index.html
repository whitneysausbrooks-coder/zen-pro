<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport — prevents iOS auto-zoom on input focus -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NeuroQuest" />

    <!-- Theme color (notch/status bar) -->
    <meta name="theme-color" content="#0f1f14" />
    <meta name="theme-color" content="#0f1f14" media="(prefers-color-scheme: dark)" />

    <!-- SEO -->
    <meta name="description" content="Compassion Casino — train your brain, fund the world. Gamified neuroplasticity with real social impact." />
    <meta name="application-name" content="NeuroQuest" />

    <!-- Open Graph -->
    <meta property="og:title" content="NeuroQuest — Mind &amp; Spirit" />
    <meta property="og:description" content="Your mind is the stake. The world is the winner." />
    <meta property="og:type" content="website" />

    <title>NeuroQuest — Mind &amp; Spirit</title>

    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- iOS splash (minimal) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
